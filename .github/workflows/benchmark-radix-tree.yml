name: Benchmark - Radix Tree

on:
  push:
    branches: [ main ]
    paths:
      - 'model_gateway/benches/radix_tree_benchmark.rs'
      - 'crates/kv_index/**'
      - '!crates/kv_index/**/tests/**'
      - '!crates/kv_index/**/*_test.rs'
      - '!crates/kv_index/**/test_*.rs'
  pull_request:
    branches: [ main ]
    paths:
      - 'model_gateway/benches/radix_tree_benchmark.rs'
      - 'crates/kv_index/**'
      - '!crates/kv_index/**/tests/**'
      - '!crates/kv_index/**/*_test.rs'
      - '!crates/kv_index/**/test_*.rs'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: benchmark-radix-tree-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

permissions:
  contents: read

jobs:
  benchmark:
    name: Radix Tree (Cache-Aware Routing)
    if: github.repository == 'lightseekorg/smg'
    # CPU-only criterion/throughput benchmarks of the kv-index radix tree —
    # no GPU needed, so it runs on the CPU runner pool rather than competing
    # for GPU runners.
    runs-on: k8s-runner-cpu
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 100

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          sccache-version: 'v0.10.0'

      - name: Run criterion benchmark
        timeout-minutes: 90
        run: |
          source "$HOME/.cargo/env"
          cargo bench --bench radix_tree_benchmark -- benchmark_summary 2>&1 | tee benchmark_output.txt

      - name: Run throughput benchmark (synthetic)
        # Heavy throughput sweep OOM-kills the CPU runner on PRs; run on main/nightly only.
        if: github.event_name != 'pull_request'
        timeout-minutes: 30
        run: |
          source "$HOME/.cargo/env"
          cargo bench -p kv-index --bench throughput_bench -- \
            --num-sessions 200000 \
            --num-workers 256 \
            --jump-size 8 \
            --sweep-min-ms 10 \
            --sweep-steps 20 2>&1 | tee throughput_output.txt

      - name: Download Mooncake traces
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/traces"
          for trace in conversation_trace synthetic_trace toolagent_trace; do
            curl -sL "https://raw.githubusercontent.com/kvcache-ai/Mooncake/main/FAST25-release/traces/${trace}.jsonl" \
              -o "$GITHUB_WORKSPACE/traces/${trace}.jsonl"
            echo "Downloaded ${trace}.jsonl ($(wc -l < "$GITHUB_WORKSPACE/traces/${trace}.jsonl") requests)"
          done

      - name: Run throughput benchmark (Mooncake traces)
        if: github.event_name != 'pull_request'
        timeout-minutes: 30
        run: |
          source "$HOME/.cargo/env"
          for trace in conversation_trace synthetic_trace toolagent_trace; do
            echo "=== ${trace} ==="
            cargo bench -p kv-index --bench throughput_bench -- \
              --trace-path "$GITHUB_WORKSPACE/traces/${trace}.jsonl" \
              --trace-duplication-factor 20 \
              --num-workers 256 \
              --jump-size 8 \
              --sweep-min-ms 10 \
              --sweep-steps 20 2>&1 | tee -a mooncake_output.txt
            echo "" >> mooncake_output.txt
          done

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: radix-tree-results-${{ github.sha }}
          path: |
            target/criterion/benchmark_summary/
            benchmark_output.txt
            throughput_output.txt
            mooncake_output.txt
          retention-days: 30

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Summary
        if: always()
        run: |
          echo "## Radix Tree Benchmark (Cache-Aware Routing)" >> $GITHUB_STEP_SUMMARY
          if [ -f benchmark_output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 benchmark_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Throughput Benchmark — Synthetic (Block ops/sec)" >> $GITHUB_STEP_SUMMARY
          if [ -f throughput_output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 throughput_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Throughput Benchmark — Mooncake Traces (Block ops/sec)" >> $GITHUB_STEP_SUMMARY
          if [ -f mooncake_output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -80 mooncake_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
