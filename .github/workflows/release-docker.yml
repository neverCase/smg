name: Release Docker Image

on:
  push:
    branches:
      - main
    paths:
      - docker/Dockerfile
      - bindings/python/pyproject.toml
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v1.0.1). Leave empty to use version from pyproject.toml'
        required: false
        type: string

permissions:
  contents: read

jobs:
  # Always runs: validates the Dockerfile builds successfully.
  # Pushes only when triggered by a version bump (pyproject.toml) or manual dispatch.
  build-and-push:
    name: Build and push Docker image
    if: github.repository == 'lightseekorg/smg'
    runs-on: ["cpu-e5"]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version tag
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ -n "${INPUT_TAG}" ]]; then
            VERSION="${INPUT_TAG}"
          else
            VERSION=$(grep -m1 '^version = ' bindings/python/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using version: ${VERSION}"

      - name: Check if this is a release (should push)
        id: should-push
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_AFTER: ${{ github.sha }}
        run: |
          PUSH="false"
          # Manual dispatch always pushes
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            PUSH="true"
          fi
          # Push event: only push if pyproject.toml changed (version bump)
          # Uses the full push range (before..after) to catch changes across
          # multiple commits, not just HEAD~1.
          if [[ "${EVENT_NAME}" == "push" ]]; then
            # Capture changed files first so a git failure fails the step,
            # instead of being swallowed by the pipe and silently leaving
            # PUSH=false.
            CHANGED=$(git diff --name-only "${EVENT_BEFORE}" "${EVENT_AFTER}")
            if grep -q '^bindings/python/pyproject.toml$' <<<"${CHANGED}"; then
              PUSH="true"
            fi
          fi
          echo "push=${PUSH}" >> "$GITHUB_OUTPUT"
          echo "Will push: ${PUSH}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.should-push.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ steps.should-push.outputs.push }}
          tags: |
            lightseekorg/smg:${{ steps.version.outputs.version }}
            lightseekorg/smg:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Summary
        if: always()
        env:
          PUSH: ${{ steps.should-push.outputs.push }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          VERSION: ${{ steps.version.outputs.version }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          IMAGE="lightseekorg/smg:${VERSION}"
          LATEST="lightseekorg/smg:latest"
          if [[ "${BUILD_OUTCOME}" == "success" && "${PUSH}" == "true" ]]; then
            {
              echo "### ✅ Docker image pushed successfully"
              echo ""
              echo "| Tag | Reference |"
              echo "| --- | --- |"
              echo "| \`${VERSION}\` | \`${IMAGE}\` |"
              echo "| \`latest\` | \`${LATEST}\` |"
              if [[ -n "${DIGEST}" ]]; then
                echo ""
                echo "Digest: \`${DIGEST}\`"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${BUILD_OUTCOME}" == "success" ]]; then
            {
              echo "### ⚠️ Docker image built but NOT pushed"
              echo ""
              echo "\`${IMAGE}\` was built and validated, but not published — no version bump in \`bindings/python/pyproject.toml\` and not a manual dispatch."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Docker image ${IMAGE} was built but not pushed."
          else
            {
              echo "### ❌ Docker image build failed"
              echo ""
              echo "\`${IMAGE}\` was **not** pushed because the build did not succeed (outcome: \`${BUILD_OUTCOME}\`)."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Docker image ${IMAGE} was not pushed (build outcome: ${BUILD_OUTCOME})."
          fi
