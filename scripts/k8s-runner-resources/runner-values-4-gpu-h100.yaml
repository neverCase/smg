## GitHub config URL for the runner scale set
githubConfigUrl: "https://github.com/lightseekorg/smg"

## Name of the Kubernetes secret containing GitHub credentials
## The secret should contain either a PAT (github_token) or GitHub App credentials
githubConfigSecret: github-arc-secret

## Runner scaling configuration
minRunners: 4
maxRunners: 8

## name of the runner scale set to create.  Defaults to the helm release name
runnerScaleSetName: "4-gpu-h100"

resourceMeta: {}
keyVault: {}

## Runner pod template
template:
  spec:
    terminationGracePeriodSeconds: 600

    nodeSelector:
      nvidia.com/gpu: "true"
      node.kubernetes.io/instance-type: BM.GPU.H100.8

    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

    affinity:
      podAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: actions.github.com/scale-set-name
                    operator: In
                    values:
                      - 4-gpu-h100
              topologyKey: kubernetes.io/hostname

    volumes:
      - name: work
        hostPath:
          path: /raid/actions-runner
          type: DirectoryOrCreate
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
      - name: runner-nvme
        hostPath:
          path: /raid/actions-runner
          type: DirectoryOrCreate
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
      - name: dind-sock
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
      - name: docker-storage
        hostPath:
          path: /raid/actions-runner
          type: DirectoryOrCreate

    containers:
      - name: runner
        image: fra.ocir.io/idqj093njucb/action-runner:v0.0.2
        command:
          - /home/runner/run.sh
        env:
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
          - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
            value: '120'
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
        resources:
          requests:
            cpu: "32"
            memory: "128Gi"
          limits:
            nvidia.com/gpu: 4
        volumeMounts:
          - name: model-cache
            mountPath: /models
          - name: dshm
            mountPath: /dev/shm
          - name: work
            mountPath: /home/runner/_work
            subPathExpr: $(POD_NAME)/_work
          - name: runner-nvme
            mountPath: /home/runner/.cache
            subPathExpr: $(POD_NAME)/.cache
          - name: runner-nvme
            mountPath: /tmp
            subPathExpr: $(POD_NAME)/tmp
          - name: dind-sock
            mountPath: /var/run
          - name: docker-storage
            mountPath: /var/lib/docker
            subPathExpr: $(POD_NAME)/docker

    initContainers:
      - name: prepare-runner-nvme
        image: fra.ocir.io/idqj093njucb/docker:dind
        command:
          - sh
          - -c
          - mkdir -p /runner-nvme/${POD_NAME}/_work /runner-nvme/${POD_NAME}/.cache /runner-nvme/${POD_NAME}/tmp /runner-nvme/${POD_NAME}/docker /models/.locks /models/hub /models/hub/.locks && chown -R 1001:1001 /runner-nvme/${POD_NAME} && chown 1001:1001 /models/.locks /models/hub /models/hub/.locks && chmod 1777 /runner-nvme/${POD_NAME}/tmp /models/.locks /models/hub/.locks
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
        volumeMounts:
          - mountPath: /runner-nvme
            name: runner-nvme
          - mountPath: /models
            name: model-cache
      - name: init-dind-externals
        args:
          - '-r'
          - /home/runner/externals/.
          - /home/runner/tmpDir/
        command:
          - cp
        image: fra.ocir.io/idqj093njucb/action-runner:v0.0.2
        volumeMounts:
          - mountPath: /home/runner/tmpDir
            name: dind-externals
      - name: dind
        args:
          - dockerd
          - '--host=unix:///var/run/docker.sock'
          - '--group=$(DOCKER_GROUP_GID)'
        env:
          - name: DOCKER_GROUP_GID
            value: '123'
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
        image: fra.ocir.io/idqj093njucb/docker:dind
        restartPolicy: Always
        securityContext:
          privileged: true
        lifecycle:
          preStop:
            exec:
              command:
                - sh
                - -c
                - rm -rf -- "/runner-nvme/${POD_NAME:?}"
        startupProbe:
          exec:
            command:
              - docker
              - info
          failureThreshold: 24
          initialDelaySeconds: 0
          periodSeconds: 5
        volumeMounts:
          - mountPath: /runner-nvme
            name: runner-nvme
          - mountPath: /home/runner/_work
            name: work
            subPathExpr: $(POD_NAME)/_work
          - mountPath: /var/run
            name: dind-sock
          - mountPath: /home/runner/externals
            name: dind-externals
          - name: docker-storage
            mountPath: /var/lib/docker
            subPathExpr: $(POD_NAME)/docker
